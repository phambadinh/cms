content = server:
  port: 8080
  servlet:
    context-path: /
  
spring:
  application:
    name: cms-api
  data:
    mongodb:
      uri: mongodb://localhost:27017/cms_db
      auto-index-creation: true

jwt:
  secret: ThisIsAVeryLongSecretKeyForHS512EncryptionThatMustBeAtLeast256BitsLongForHmacSHA512AlgorithmToWorkProperlyInJWTTokenGeneration
  expiration: 86400000

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"